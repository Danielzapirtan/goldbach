name: Goldbach

on:
  workflow_dispatch:

jobs:
  bench:
    name: Bench Job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Preparations
        run: |
          sudo apt update
          sudo apt install -y gfortran build-essential
 
      - name: Execution
        run: |
          ulimit -t 18000
          cat goldbach.f
          gfortran -o goldbach goldbach.f -w -march=native -O4 -std=legacy
          ./goldbach <<< 5
